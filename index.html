<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-[url('/images/bg.jpg')] bg-cover bg-center bg-no-repeat
    min-h-screen">

<div class="w-full flex justify-center pt-10">
    <div class="flex bg-[#37BACC] rounded-3xl shadow-2xl overflow-hidden focus-within:translate-y-4 focus-within:scale-105 transition">
         <input 
            type="text"
            placeholder="search username..."
            class="px-6 bg-[#37BACC] py-2 w-72 placeholder-white outline-none text-white" >
        <button class=" rounded-3xl text-white px-6 hover:bg-[#4FC6DA]">
            <i class="fas fa-search"></i>
        </button>
    </div>
</div>

<section id ="userStats" class="flex justify-center mt-10 hidden ">
  <div class="flex gap-10 text-[#37BACC] text-lg">

    <div class="text-center">
      <p id="followers" class="font-bold">0</p>
      <p>Followers</p>
    </div>

    <div class="text-center">
      <p id="following" class="font-bold">0</p>
      <p>Following</p>
    </div>

    <div class="text-center">
      <p id="repos" class="font-bold">0</p>
      <p>Repos</p>
    </div>

  </div>
</section>

<section class = "flex justify-center mt-10">
  <div class = "bg-[#37BACC] p-6 rounded-2xl shadow-xl w-80 flex flex-col  gap-4">
    <h3 class = "text-white text-lg font-semibold text-center">
      Create Repository
    </h3>
    <input id = "tokenInput" type = "text" placeholder = "Enter Github Token"
    class = "px-4 py-2 rounded-lg outline-none">

    <input id= "repoNameInput" type = "text" placeholder = "Repository Name"
    class = "px-4 py-2 rounded-lg outline-none">

    <button id = "createRepobtn" class="bg-[#2FA4B5] text-white py-2 rounded-lg hover:bg-[#2B8FA0]">Generate</button>

  </div>
</section>

<h2 id="repoHeading" class="text-center text-[#2FA4B5] text-2xl font-bold mt-10 hidden">
  Your Repositories
</h2>


<section id="repoList" class="mt-8 hidden grid grid-cols-1 sm:grid-cols-3 gap-6 place-items-center px-4 max-w-5xl mx-auto mb-6">
</section>


<script src="script.js"></script>
</body>
</html>
